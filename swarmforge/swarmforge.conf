# DA Capability Map — SwarmForge Configuration
#
# Four-agent swarm tuned for data-research + web-dev work:
#   specifier  → researcher → coder → analyst → (back to specifier)
#
# Usage (from project root on a machine with tmux + Babashka):
#   BRANCH=four-pack
#   curl -L "https://github.com/unclebob/swarm-forge/archive/refs/heads/${BRANCH}.tar.gz" \
#     | tar -xz --strip-components=1
#   ./swarm
#
# window <role> <backend> <worktree> [task|batch]

window specifier claude master
window researcher claude researcher
window coder      claude coder
window analyst    claude analyst
